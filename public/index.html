<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MotoVote Live</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="bg"></div>

<header class="nav">
  <h1>🏍️ MOTOVOTE LIVE</h1>
  <button onclick="login()">Login Google</button>
</header>

<section class="hero">
  <h2>Voting System Real-Time</h2>
  <p>1 user = 1 vote (anti cheat system)</p>
</section>

<section class="grid">

  <div class="card">
    <h3>Y15ZR</h3>
    <p id="y15">0</p>
    <button onclick="vote('y15zr')">UNDI</button>
  </div>

  <div class="card">
    <h3>RS150R</h3>
    <p id="rs">0</p>
    <button onclick="vote('rs150r')">UNDI</button>
  </div>

  <div class="card">
    <h3>RXZ</h3>
    <p id="rxz">0</p>
    <button onclick="vote('rxz')">UNDI</button>
  </div>

</section>

<section class="result">
  <h2>Live Ranking 🔥</h2>

  <div class="barbox">
    <span>Y15ZR</span>
    <div class="bar"><div id="bar1"></div></div>
  </div>

  <div class="barbox">
    <span>RS150R</span>
    <div class="bar"><div id="bar2"></div></div>
  </div>

  <div class="barbox">
    <span>RXZ</span>
    <div class="bar"><div id="bar3"></div></div>
  </div>

</section>

<script src="app.js"></script>
</body>
</html>
